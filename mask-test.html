<!DOCTYPE html>
<html>
<head>
<style>
  body {
    background: linear-gradient(45deg, red, blue);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .moon-loader {
    height: 100px;
    width: 100px;
    border-radius: 50%;
    background-color: #e8e8e8;
    border: 4px solid #e8e8e8;
    box-shadow: 0 0 15px rgba(232,232,232,0.8);
    
    -webkit-mask-image: radial-gradient(circle 60px at center, transparent 99%, black 100%);
    mask-image: radial-gradient(circle 60px at center, transparent 99%, black 100%);
    -webkit-mask-size: 400px 400px;
    mask-size: 400px 400px;
    -webkit-mask-repeat: no-repeat;
    mask-repeat: no-repeat;
    animation: eclipse-mask 2s infinite;
  }

  @keyframes eclipse-mask {
    0% {
      -webkit-mask-position: -50px -150px;
      mask-position: -50px -150px;
    }
    50% {
      -webkit-mask-position: -150px -150px;
      mask-position: -150px -150px;
    }
    100% {
      -webkit-mask-position: -250px -150px;
      mask-position: -250px -150px;
    }
  }
</style>
</head>
<body>
  <div class="moon-loader"></div>
</body>
</html>
